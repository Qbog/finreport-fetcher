# 单模板单文件示例：结构分析（资产负债表 - 关键科目）
# structure 模式只取“一个期末”（默认取 --end 对应的最近可用季度；也可用 --as-of 指定）。

name = "nonfin-structure-bs_key_items"
alias = "资产负债表关键科目结构分析"

names = ["bs_key_items_structure", "bs_key_items_structure#资产负债表关键科目结构分析", "nonfin-structure-bs_key_items"]
type = "bar"
mode = "structure"  # Previously "compare", reflects structural analysis

title = "资产负债表关键科目结构分析"

x_label = "科目"
y_label = "金额"


[[series]]
name = "货币资金"
expr = "bs.cash"

[[series]]
name = "应收账款"
expr = "bs.accounts_receivable"

[[series]]
name = "预付款项"
expr = "bs.prepayments"

[[series]]
name = "固定资产"
expr = "bs.fixed_assets"

[[series]]
name = "应付账款"
expr = "bs.accounts_payable"

[[series]]
name = "应付职工薪酬"
expr = "bs.payroll_payable"

[[series]]
name = "归属于母公司所有者权益合计"
expr = "bs.total_equity_parent"
