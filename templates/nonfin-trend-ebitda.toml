# 非金融 / 趋势分析 / EBITDA 趋势
# 采用显式公式口径：
# EBITDA = EBIT + Depreciation + Amortization
# 近似实现：
#   EBIT = 利润总额 + 利息费用 + 所得税费用
#   D&A = 固定资产折旧 + 无形资产摊销 + 长期待摊费用摊销

name = "nonfin-trend-ebitda"
alias = "EBITDA趋势"

names = ["ebitda_trend", "ebitda_trend#EBITDA趋势", "nonfin-trend-ebitda"]
type = "bar"
mode = "trend"

title = "EBITDA趋势"
x_label = "报告期"
y_label = "金额"

[[series]]
name = "EBITDA"
expr = "(is.total_profit + is.interest_expense + is.income_tax) + (cf.depreciation + cf.amortization_intangibles + cf.amortization_long_term_deferred_expenses)"
