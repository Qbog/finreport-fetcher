# 非金融 / 趋势分析 / PE 趋势
# 这里按更可计算、也更标准的口径实现：
#   PE = 股价 / 每股收益TTM
# 其中：
#   每股收益TTM = 当期累计EPS + 上年年报EPS - 上年同期EPS

name = "nonfin-trend-pe"
alias = "PE趋势"

names = ["pe_trend", "pe_trend#PE趋势", "nonfin-trend-pe"]
type = "line"
mode = "price"

title = "PE趋势"
x_label = "日期"
y_label = "PE"

[[series]]
name = "PE"
expr = "px.close / (metrics.basic_eps + metrics.basic_eps.prev_year.q4 - metrics.basic_eps.prev_year)"
