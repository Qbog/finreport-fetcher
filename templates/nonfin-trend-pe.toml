# 非金融 / 趋势分析 / PE 趋势
# 用户口径：当 EPS_TTM 为负时自动转正显示。
# 这里实现为：PE = abs(股价 / EPS_TTM)
# 其中：EPS_TTM = 当期累计EPS + 上年年报EPS - 上年同期EPS
# 使用稳定 key：metrics.per_share.basic_eps

name = "nonfin-trend-pe"
alias = "PE趋势"

names = ["pe_trend", "pe_trend#PE趋势", "nonfin-trend-pe"]
type = "line"
mode = "price"

title = "PE趋势"
x_label = "日期"
y_label = "PE"

[[series]]
name = "PE"
expr = "abs(px.close / (metrics.per_share.basic_eps + metrics.per_share.basic_eps.prev_year.q4 - metrics.per_share.basic_eps.prev_year))"
