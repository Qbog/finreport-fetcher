# 资产负债表分析（柱状结构图）
# - structure 模式：当传入 --start/--end 时，会对区间内每个报告期分别生成 1 张图
# - 支持嵌套分组与颜色（子项可覆盖，未覆盖则继承分组颜色）

name = "nonfin-structure-balance_sheet_analysis"
alias = "资产负债表分析"

names = ["balance_sheet_analysis", "balance_sheet_analysis#资产负债表分析", "nonfin-structure-balance_sheet_analysis"]
type = "bar"
mode = "structure"  # Previously "compare", reflects structural analysis

title = "资产负债表分析（资产 vs 负债）"

x_label = "科目"
y_label = "金额"


[[series]]
name = "资产"
color = "#4E79A7"

  [[series.children]]
  name = "货币资金"
  expr = "bs.cash"

  [[series.children]]
  name = "应收账款"
  expr = "bs.accounts_receivable"

  [[series.children]]
  name = "预付账款"
  expr = "bs.prepayments"

  [[series.children]]
  name = "存货"
  expr = "bs.inventories"

  [[series.children]]
  name = "固定资产"
  expr = "bs.fixed_assets"

  [[series.children]]
  name = "无形资产"
  expr = "bs.intangible_assets"

[[series]]
name = "负债"
color = "#E15759"

  [[series.children]]
  name = "短期借款"
  expr = "bs.short_term_borrowings"

  [[series.children]]
  name = "应付账款"
  expr = "bs.accounts_payable"

  [[series.children]]
  name = "预收款项"
  expr = "bs.advance_receipts"

  [[series.children]]
  name = "应付职工薪酬"
  expr = "bs.payroll_payable"

  [[series.children]]
  name = "非流动负债合计"
  expr = "bs.total_non_current_liabilities"
