# 净利润TTM趋势

name = "nonfin-trend-net_profit_q"
alias = "净利润TTM"

names = ["net_profit_q", "net_profit_q#净利润", "nonfin-trend-net_profit_q"]
type = "bar"

title = "净利润（报告期）趋势(TTM)"

