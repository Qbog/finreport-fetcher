# 自动生成：non_financial 类别的固定财报科目模板（common keys）
# - 由 subject_glossary.SubjectSpec(common/common_in) 推导
# - 仅包含‘通用’科目；其余科目在导出时将被视为非通用并高亮/备注

category = "non_financial"
version = 1

[balance_sheet]
keys = [
  "bs.section.core_metrics", # 报表核心指标 | Core metrics
  "bs.section.current_assets", # 流动资产 | Current assets
