  "bs.cash", # 货币资金 | Cash and cash equivalents
  "bs.total_cash", # 总现金 | Total cash
  "bs.trading_fin_assets", # 交易性金融资产 | Trading financial assets
  "bs.notes_receivable", # 应收票据 | Notes receivable
  "bs.accounts_receivable", # 应收账款 | Accounts receivable
